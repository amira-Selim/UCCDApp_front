<div class="page-head mb-4 d-flex align-items-center justify-content-between flex-wrap gap-2">
  <div>
    <h3 class="fw-bold mb-1">Contact Messages</h3>
    <p class="text-muted mb-0">Messages submitted through the contact form.</p>
  </div>
  <button class="btn btn-outline-secondary btn-sm" (click)="loadMessages()">
    <i class="fa-solid fa-rotate-right me-1"></i> Refresh
  </button>
</div>

<div class="card-panel">
  <app-data-table
    [data]="messages()"
    [columns]="columns"
    [loading]="loading()"
    [error]="error()"
    searchPlaceholder="Search by name, email or issue type..."
    emptyMessage="No messages found"
    emptyIcon="fa-solid fa-envelope"
    (rowClicked)="viewMessage($event)">
    <ng-template #rowActions let-row>
      <button class="btn btn-sm btn-outline-primary me-1" (click)="viewMessage(row)" title="View">
        <i class="fa-solid fa-eye"></i>
      </button>
      <button class="btn btn-sm btn-outline-danger" (click)="deleteMessage(row)" title="Delete">
        <i class="fa-solid fa-trash"></i>
      </button>
    </ng-template>
  </app-data-table>
</div>

<!-- Detail modal -->
<div class="detail-modal-backdrop" *ngIf="selectedMessage()" (click)="closeDetail()"></div>
<div class="detail-modal" *ngIf="selectedMessage() as m">
  <div class="detail-header d-flex align-items-center justify-content-between">
    <h5 class="mb-0">Message from {{ m.name }}</h5>
    <button class="btn-close" (click)="closeDetail()"></button>
  </div>
  <div class="detail-body">
    <div class="detail-row"><span class="detail-label">Email</span><span>{{ m.email }}</span></div>
    <div class="detail-row"><span class="detail-label">Issue Type</span><span>{{ m.issueType }}</span></div>
    <div class="detail-row"><span class="detail-label">Received</span><span>{{ m.createdAt | date:'medium' }}</span></div>
    <div class="mt-3">
      <p class="detail-label mb-1">Message</p>
      <p class="mb-0">{{ m.content }}</p>
    </div>
  </div>
  <div class="detail-footer d-flex justify-content-end gap-2">
    <button class="btn btn-outline-danger" (click)="deleteMessage(m)">
      <i class="fa-solid fa-trash me-1"></i> Delete
    </button>
    <button class="btn btn-light" (click)="closeDetail()">Close</button>
  </div>
</div>
