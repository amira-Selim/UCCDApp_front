<div class="px-4 sm:px-6 lg:px-8 py-8 w-full max-w-9xl mx-auto">
  <div class="mb-6">
    <a routerLink="/admin/companies" class="text-blue-500 hover:text-blue-700 flex items-center mb-4">
      <i class="fa-solid fa-arrow-left mr-2"></i> Back to Companies
    </a>
    <h1 class="text-2xl md:text-3xl text-gray-800 font-bold">Jobs for {{companyEmail}}</h1>
  </div>

  <div class="bg-white shadow-lg rounded-sm border border-gray-200">
    <header class="px-5 py-4 border-b border-gray-100">
      <h2 class="font-semibold text-gray-800">Job Listings <span class="text-gray-400 font-medium">({{jobs.length}})</span></h2>
    </header>
    
    <div class="p-3">
      <div *ngIf="isLoading" class="text-center py-8">
        <div class="inline-block animate-spin rounded-full h-8 w-8 border-b-2 border-blue-600"></div>
        <p class="mt-2 text-gray-500">Loading jobs...</p>
      </div>

      <div *ngIf="!isLoading && jobs.length === 0" class="text-center py-12">
        <div class="bg-gray-50 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4">
          <i class="fa-solid fa-briefcase text-2xl text-gray-400"></i>
        </div>
        <h3 class="text-lg font-medium text-gray-900 mb-1">No Jobs Posted</h3>
        <p class="text-gray-500">This company hasn't posted any jobs yet.</p>
      </div>

      <div class="overflow-x-auto" *ngIf="!isLoading && jobs.length > 0">
        <table class="table-auto w-full">
          <thead class="text-xs font-semibold uppercase text-gray-500 bg-gray-50">
            <tr>
              <th class="px-2 py-3 whitespace-nowrap"><div class="font-semibold text-left">Job Title</div></th>
              <th class="px-2 py-3 whitespace-nowrap"><div class="font-semibold text-left">Status</div></th>
              <th class="px-2 py-3 whitespace-nowrap"><div class="font-semibold text-center">Applicants</div></th>
              <th class="px-2 py-3 whitespace-nowrap"><div class="font-semibold text-center">Actions</div></th>
            </tr>
          </thead>
          <tbody class="text-sm divide-y divide-gray-100">
            <tr *ngFor="let job of jobs" class="hover:bg-gray-50">
              <td class="px-2 py-3 whitespace-nowrap">
                <div class="font-medium text-gray-800">{{job.title}}</div>
                <div class="text-xs text-gray-500">{{job.type}}</div>
              </td>
              <td class="px-2 py-3 whitespace-nowrap">
                <span *ngIf="job.status === 0" class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-yellow-100 text-yellow-800">
                  Pending Approval
                </span>
                <span *ngIf="job.status === 1" class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-green-100 text-green-800">
                  Approved
                </span>
                <span *ngIf="job.status === 2" class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-red-100 text-red-800" [title]="job.rejectionReason">
                  Rejected
                </span>
              </td>
              <td class="px-2 py-3 whitespace-nowrap text-center">
                <div class="font-medium text-gray-800">{{job.totalApplicants}}</div>
              </td>
              <td class="px-2 py-3 whitespace-nowrap text-center">
                <div class="flex justify-center gap-2">
                  <button *ngIf="job.status === 0" (click)="approveJob(job.id)" class="text-green-500 hover:text-green-700 bg-green-50 hover:bg-green-100 px-3 py-1 rounded border border-green-200 transition-colors" title="Approve">
                    <i class="fa-solid fa-check mr-1"></i> Approve
                  </button>
                  <button *ngIf="job.status === 0" (click)="openRejectModal(job.id)" class="text-red-500 hover:text-red-700 bg-red-50 hover:bg-red-100 px-3 py-1 rounded border border-red-200 transition-colors" title="Reject">
                    <i class="fa-solid fa-xmark mr-1"></i> Reject
                  </button>
                  <a [routerLink]="['/admin/jobs', job.id]" class="text-blue-500 hover:text-blue-700 bg-blue-50 hover:bg-blue-100 px-3 py-1 rounded border border-blue-200 transition-colors">
                    Details
                  </a>
                </div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- Reject Modal -->
<div *ngIf="showRejectModal" class="fixed inset-0 z-50 overflow-y-auto flex items-center justify-center bg-gray-900 bg-opacity-50">
  <div class="bg-white rounded-lg shadow-lg w-full max-w-md mx-4 overflow-hidden">
    <div class="px-6 py-4 border-b border-gray-100 flex justify-between items-center bg-gray-50">
      <h3 class="text-lg font-semibold text-gray-800 text-red-600">Reject Job</h3>
      <button (click)="closeRejectModal()" class="text-gray-400 hover:text-gray-600">
        <i class="fa-solid fa-xmark text-xl"></i>
      </button>
    </div>
    
    <div class="p-6">
      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-1">Reason for Rejection <span class="text-red-500">*</span></label>
        <textarea [(ngModel)]="rejectionReason" rows="4" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-red-500" placeholder="Explain why this job is being rejected..."></textarea>
      </div>
      
      <div class="flex justify-end gap-3">
        <button (click)="closeRejectModal()" class="px-4 py-2 border border-gray-300 text-gray-700 rounded-md hover:bg-gray-50 transition-colors">Cancel</button>
        <button (click)="submitRejection()" [disabled]="isSubmitting" class="px-4 py-2 bg-red-600 text-white rounded-md hover:bg-red-700 transition-colors flex items-center disabled:opacity-50">
          <i *ngIf="isSubmitting" class="fa-solid fa-spinner fa-spin mr-2"></i>
          {{ isSubmitting ? 'Rejecting...' : 'Confirm Rejection' }}
        </button>
      </div>
    </div>
  </div>
</div>
