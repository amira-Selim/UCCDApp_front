<div class="px-4 sm:px-6 lg:px-8 py-8 w-full max-w-9xl mx-auto">
  <div class="sm:flex sm:justify-between sm:items-center mb-8">
    <div class="mb-4 sm:mb-0">
      <h1 class="text-2xl md:text-3xl text-gray-800 font-bold">Companies Management</h1>
    </div>
    <div class="grid grid-flow-col sm:auto-cols-max justify-start sm:justify-end gap-2">
      <button (click)="openModal()" class="btn bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg flex items-center">
        <i class="fa-solid fa-plus mr-2"></i> Add Company
      </button>
    </div>
  </div>

  <div class="bg-white shadow-lg rounded-sm border border-gray-200">
    <header class="px-5 py-4 border-b border-gray-100">
      <h2 class="font-semibold text-gray-800">All Companies <span class="text-gray-400 font-medium">({{companies.length}})</span></h2>
    </header>
    
    <div class="p-3">
      <div *ngIf="isLoading" class="text-center py-8">
        <div class="inline-block animate-spin rounded-full h-8 w-8 border-b-2 border-blue-600"></div>
        <p class="mt-2 text-gray-500">Loading companies...</p>
      </div>

      <div *ngIf="!isLoading && companies.length === 0" class="text-center py-12">
        <div class="bg-blue-50 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4">
          <i class="fa-solid fa-building text-2xl text-blue-500"></i>
        </div>
        <h3 class="text-lg font-medium text-gray-900 mb-1">No Companies Found</h3>
        <p class="text-gray-500 mb-4">Get started by creating a new company account.</p>
      </div>

      <div class="overflow-x-auto" *ngIf="!isLoading && companies.length > 0">
        <table class="table-auto w-full">
          <thead class="text-xs font-semibold uppercase text-gray-500 bg-gray-50">
            <tr>
              <th class="px-2 py-3 whitespace-nowrap"><div class="font-semibold text-left">Company Name</div></th>
              <th class="px-2 py-3 whitespace-nowrap"><div class="font-semibold text-left">Email Address</div></th>
              <th class="px-2 py-3 whitespace-nowrap"><div class="font-semibold text-center">Actions</div></th>
            </tr>
          </thead>
          <tbody class="text-sm divide-y divide-gray-100">
            <tr *ngFor="let company of companies" class="hover:bg-gray-50">
              <td class="px-2 py-3 whitespace-nowrap">
                <div class="font-medium text-gray-800">{{company.name}}</div>
              </td>
              <td class="px-2 py-3 whitespace-nowrap">
                <div class="text-left">{{company.email}}</div>
              </td>
              <td class="px-2 py-3 whitespace-nowrap text-center">
                <button [routerLink]="['/admin/companies', company.email]" class="text-blue-500 hover:text-blue-700 font-medium">
                  View Jobs &rarr;
                </button>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- Create Company Modal -->
<div *ngIf="showModal" class="fixed inset-0 z-50 overflow-y-auto flex items-center justify-center bg-gray-900 bg-opacity-50">
  <div class="bg-white rounded-lg shadow-lg w-full max-w-md mx-4 overflow-hidden">
    <div class="px-6 py-4 border-b border-gray-100 flex justify-between items-center bg-gray-50">
      <h3 class="text-lg font-semibold text-gray-800">Add New Company</h3>
      <button (click)="closeModal()" class="text-gray-400 hover:text-gray-600">
        <i class="fa-solid fa-xmark text-xl"></i>
      </button>
    </div>
    
    <div class="p-6">
      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-1">Company Name <span class="text-red-500">*</span></label>
        <input type="text" [(ngModel)]="newCompany.name" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="e.g. Google">
      </div>
      
      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-1">Company Email <span class="text-red-500">*</span></label>
        <input type="email" [(ngModel)]="newCompany.email" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="company@example.com">
      </div>
      
      <div class="mb-6">
        <label class="block text-sm font-medium text-gray-700 mb-1">Initial Password <span class="text-red-500">*</span></label>
        <input type="password" [(ngModel)]="newCompany.password" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="Must include upper, lower, number, symbol">
        <p class="text-xs text-gray-500 mt-1">They will be required to change this upon first login.</p>
      </div>
      
      <div class="flex justify-end gap-3">
        <button (click)="closeModal()" class="px-4 py-2 border border-gray-300 text-gray-700 rounded-md hover:bg-gray-50 transition-colors">Cancel</button>
        <button (click)="createCompany()" [disabled]="isSubmitting" class="px-4 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700 transition-colors flex items-center disabled:opacity-50">
          <i *ngIf="isSubmitting" class="fa-solid fa-spinner fa-spin mr-2"></i>
          {{ isSubmitting ? 'Creating...' : 'Create Account' }}
        </button>
      </div>
    </div>
  </div>
</div>
