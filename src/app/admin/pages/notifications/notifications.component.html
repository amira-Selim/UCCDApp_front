<div class="page-head mb-4 d-flex align-items-center justify-content-between flex-wrap gap-2">
  <div>
    <h3 class="fw-bold mb-1">Notifications & Activities</h3>
    <p class="text-muted mb-0">Track all updates and administrative actions on your account.</p>
  </div>
  <button class="btn btn-outline-primary" (click)="markAllAsRead()">
    <i class="fa-solid fa-check-double me-2"></i> Mark all as read
  </button>
</div>

<div class="card-panel">
  <div class="text-center py-5" *ngIf="loading()">
    <div class="spinner-border text-primary" role="status">
      <span class="visually-hidden">Loading...</span>
    </div>
  </div>

  <div class="alert alert-danger" *ngIf="error()">
    <i class="fa-solid fa-triangle-exclamation me-2"></i> {{ error() }}
  </div>

  <div class="text-center py-5 text-muted" *ngIf="!loading() && !error() && notifications().length === 0">
    <i class="fa-solid fa-bell-slash fs-1 mb-3 text-secondary"></i>
    <h5>No Notifications Yet</h5>
    <p>You're all caught up! New activities will appear here.</p>
  </div>

  <div class="list-group list-group-flush" *ngIf="!loading() && !error() && notifications().length > 0">
    <div *ngFor="let n of notifications()" class="list-group-item d-flex align-items-start gap-3 py-3" [class.bg-light]="!n.isRead">
      <div class="notification-icon rounded-circle d-flex align-items-center justify-content-center flex-shrink-0" style="width: 40px; height: 40px; background: rgba(0,0,0,0.05);">
        <i [class]="getIconForType(n.type)"></i>
      </div>
      <div class="flex-grow-1">
        <h6 class="mb-1" [class.fw-bold]="!n.isRead">{{ n.title }}</h6>
        <p class="mb-1 text-secondary small">{{ n.message }}</p>
        <small class="text-muted"><i class="fa-regular fa-clock me-1"></i>{{ n.createdAt | date:'short' }}</small>
      </div>
      <div *ngIf="!n.isRead" class="ms-auto align-self-center">
        <span class="badge bg-primary rounded-pill">New</span>
      </div>
    </div>
  </div>
</div>
