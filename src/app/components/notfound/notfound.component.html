<section class="not-found-section d-flex align-items-center justify-content-center min-vh-100 bg-light">
  <div class="container text-center">
    <div class="row justify-content-center">
      <div class="col-md-8 col-lg-6">
        <div class="error-content p-5 bg-white rounded-4 shadow-sm">
          <div class="error-icon mb-4 text-main">
            <i class="fa-solid fa-triangle-exclamation display-1"></i>
          </div>
          <h1 class="display-4 fw-bold text-dark mb-3">404</h1>
          <h3 class="h4 mb-4 text-secondary">Oops! Page Not Found</h3>
          <p class="text-muted mb-5">
            The page you are looking for might have been removed, had its name changed, or is temporarily unavailable.
          </p>
          <div class="d-flex justify-content-center gap-3">
            <a routerLink="/home" class="btn btn-main rounded-pill px-4 py-2 fw-bold">
              <i class="fa-solid fa-house me-2"></i> Back to Home
            </a>
            <a (click)="goBack()" class="btn btn-outline-secondary rounded-pill px-4 py-2 fw-bold" style="cursor: pointer;">
              <i class="fa-solid fa-arrow-left me-2"></i> Go Back
            </a>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
