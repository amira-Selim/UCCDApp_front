<section class="min-h-screen flex items-center justify-center bg-gray-50 py-12 px-4 sm:px-6 lg:px-8">
  <div class="max-w-md w-full space-y-8 bg-white p-10 rounded-xl shadow-xl">
    <div>
      <h2 class="mt-6 text-center text-3xl font-extrabold text-gray-900">
        Change Password
      </h2>
      <p class="mt-2 text-center text-sm text-gray-600">
        For your security, please change your password before continuing.
      </p>
    </div>

    <form class="mt-8 space-y-6" [formGroup]="changePasswordForm" (ngSubmit)="submitForm()">
      
      <div *ngIf="msgError" class="bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded relative" role="alert">
        <span class="block sm:inline">{{msgError}}</span>
      </div>
      <div *ngIf="msgSuccess" class="bg-green-50 border border-green-200 text-green-700 px-4 py-3 rounded relative" role="alert">
        <span class="block sm:inline">{{msgSuccess}}</span>
      </div>

      <div class="rounded-md shadow-sm -space-y-px">
        <div class="mb-4">
          <label for="currentPassword" class="sr-only">Current Password</label>
          <input id="currentPassword" type="password" formControlName="currentPassword" 
            class="appearance-none rounded-none relative block w-full px-3 py-2 border border-gray-300 placeholder-gray-500 text-gray-900 rounded-t-md focus:outline-none focus:ring-blue-500 focus:border-blue-500 focus:z-10 sm:text-sm" 
            placeholder="Current Password">
          <div *ngIf="changePasswordForm.get('currentPassword')?.errors && changePasswordForm.get('currentPassword')?.touched" class="text-red-500 text-xs mt-1">
            <span *ngIf="changePasswordForm.get('currentPassword')?.getError('required')">Current password is required.</span>
          </div>
        </div>

        <div>
          <label for="newPassword" class="sr-only">New Password</label>
          <input id="newPassword" type="password" formControlName="newPassword" 
            class="appearance-none rounded-none relative block w-full px-3 py-2 border border-gray-300 placeholder-gray-500 text-gray-900 rounded-b-md focus:outline-none focus:ring-blue-500 focus:border-blue-500 focus:z-10 sm:text-sm" 
            placeholder="New Password">
          <div *ngIf="changePasswordForm.get('newPassword')?.errors && changePasswordForm.get('newPassword')?.touched" class="text-red-500 text-xs mt-1">
            <span *ngIf="changePasswordForm.get('newPassword')?.getError('required')">New password is required.</span>
            <span *ngIf="changePasswordForm.get('newPassword')?.getError('pattern')">Password must have at least 6 characters, one uppercase, one lowercase, one number and one special character.</span>
          </div>
        </div>
      </div>

      <div>
        <button type="submit" [disabled]="changePasswordForm.invalid || isLoading"
          class="group relative w-full flex justify-center py-2 px-4 border border-transparent text-sm font-medium rounded-md text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 disabled:opacity-50">
          <span class="absolute left-0 inset-y-0 flex items-center pl-3">
            <i *ngIf="isLoading" class="fas fa-spinner fa-spin"></i>
          </span>
          Update Password
        </button>
      </div>
    </form>
  </div>
</section>
