<section class="min-vh-100 d-flex align-items-center bg-light py-5">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-6 col-lg-5">
        <div class="card border-0 shadow-lg rounded-4 overflow-hidden">
          <div class="card-body p-4 p-sm-5">
            <div class="text-center mb-4">
              <h3 class="fw-bold text-main">Forgot Password</h3>
              <p class="text-muted">Enter your email and we'll send you a link to reset your password.</p>
            </div>

            <div *ngIf="successMessage" class="alert alert-success d-flex align-items-center border-0 bg-success-subtle rounded-3" role="alert">
              <i class="fa-solid fa-circle-check fs-4 me-2 text-success"></i>
              <div>{{ successMessage }}</div>
            </div>

            <div *ngIf="errorMessage" class="alert alert-danger d-flex align-items-center border-0 bg-danger-subtle rounded-3" role="alert">
              <i class="fa-solid fa-circle-exclamation fs-4 me-2 text-danger"></i>
              <div>{{ errorMessage }}</div>
            </div>

            <form [formGroup]="forgotForm" (ngSubmit)="onSubmit()" *ngIf="!successMessage">
              <div class="mb-4">
                <label for="email" class="form-label fw-medium text-dark">Email Address</label>
                <div class="input-group input-group-lg">
                  <span class="input-group-text bg-white border-end-0 text-muted">
                    <i class="fa-regular fa-envelope"></i>
                  </span>
                  <input type="email" class="form-control border-start-0 ps-0" id="email" formControlName="email" placeholder="name@example.com" [class.is-invalid]="forgotForm.get('email')?.errors && forgotForm.get('email')?.touched">
                </div>
                <div class="text-danger small mt-1" *ngIf="forgotForm.get('email')?.errors && forgotForm.get('email')?.touched">
                  <span *ngIf="forgotForm.get('email')?.getError('required')">Email is required</span>
                  <span *ngIf="forgotForm.get('email')?.getError('email')">Please enter a valid email</span>
                </div>
              </div>

              <button type="submit" class="btn btn-main btn-lg w-100 rounded-pill fw-bold shadow-sm d-flex justify-content-center align-items-center gap-2" [disabled]="isLoading">
                <span *ngIf="!isLoading">Send Reset Link</span>
                <span *ngIf="isLoading" class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span>
                <span *ngIf="isLoading">Sending...</span>
              </button>
            </form>

            <div class="text-center mt-4">
              <a routerLink="/auth/login" class="text-decoration-none fw-medium text-main">
                <i class="fa-solid fa-arrow-left me-1"></i> Back to Login
              </a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
