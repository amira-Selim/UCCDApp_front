<section class="min-vh-100 d-flex align-items-center bg-light py-5">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-6 col-lg-5">
        <div class="card border-0 shadow-lg rounded-4 overflow-hidden">
          <div class="card-body p-4 p-sm-5">
            <div class="text-center mb-4">
              <h3 class="fw-bold text-main">Reset Password</h3>
              <p class="text-muted">Enter your new password below to reset it.</p>
            </div>

            <div *ngIf="successMessage" class="alert alert-success d-flex align-items-center border-0 bg-success-subtle rounded-3" role="alert">
              <i class="fa-solid fa-circle-check fs-4 me-2 text-success"></i>
              <div>{{ successMessage }}</div>
            </div>

            <div *ngIf="errorMessage" class="alert alert-danger d-flex align-items-center border-0 bg-danger-subtle rounded-3" role="alert">
              <i class="fa-solid fa-circle-exclamation fs-4 me-2 text-danger"></i>
              <div>{{ errorMessage }}</div>
            </div>

            <form [formGroup]="resetForm" (ngSubmit)="onSubmit()" *ngIf="!successMessage && !errorMessage.includes('Invalid reset link')">
              
              <div class="mb-3">
                <label for="newPassword" class="form-label fw-medium text-dark">New Password</label>
                <div class="input-group input-group-lg">
                  <span class="input-group-text bg-white border-end-0 text-muted">
                    <i class="fa-solid fa-lock"></i>
                  </span>
                  <input type="password" class="form-control border-start-0 ps-0" id="newPassword" formControlName="newPassword" placeholder="Enter new password" [class.is-invalid]="resetForm.get('newPassword')?.errors && resetForm.get('newPassword')?.touched">
                </div>
                <div class="text-danger small mt-1" *ngIf="resetForm.get('newPassword')?.errors && resetForm.get('newPassword')?.touched">
                  <span *ngIf="resetForm.get('newPassword')?.getError('required')">New password is required.</span>
                  <span *ngIf="resetForm.get('newPassword')?.getError('minlength')">Password must be at least 6 characters.</span>
                </div>
              </div>

              <div class="mb-4">
                <label for="confirmPassword" class="form-label fw-medium text-dark">Confirm Password</label>
                <div class="input-group input-group-lg">
                  <span class="input-group-text bg-white border-end-0 text-muted">
                    <i class="fa-solid fa-lock"></i>
                  </span>
                  <input type="password" class="form-control border-start-0 ps-0" id="confirmPassword" formControlName="confirmPassword" placeholder="Confirm new password" [class.is-invalid]="(resetForm.get('confirmPassword')?.errors || resetForm.hasError('passwordMismatch')) && resetForm.get('confirmPassword')?.touched">
                </div>
                <div class="text-danger small mt-1" *ngIf="(resetForm.get('confirmPassword')?.errors || resetForm.hasError('passwordMismatch')) && resetForm.get('confirmPassword')?.touched">
                  <span *ngIf="resetForm.get('confirmPassword')?.getError('required')">Please confirm your new password.</span>
                  <span *ngIf="resetForm.hasError('passwordMismatch')">Passwords do not match.</span>
                </div>
              </div>

              <button type="submit" class="btn btn-main btn-lg w-100 rounded-pill fw-bold shadow-sm d-flex justify-content-center align-items-center gap-2" [disabled]="isLoading">
                <span *ngIf="!isLoading">Reset Password</span>
                <span *ngIf="isLoading" class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span>
                <span *ngIf="isLoading">Resetting...</span>
              </button>
            </form>

            <div class="text-center mt-4" *ngIf="!successMessage">
              <a routerLink="/auth/login" class="text-decoration-none fw-medium text-main">
                <i class="fa-solid fa-arrow-left me-1"></i> Back to Login
              </a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
